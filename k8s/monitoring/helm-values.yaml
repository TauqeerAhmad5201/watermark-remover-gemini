# use of this file: 

# kube-prometheus-stack Helm values
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     -n monitoring -f k8s/monitoring/helm-values.yaml

# ── Grafana ────────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  # adminPassword removed – injected via Kubernetes Secret instead (never commit plaintext passwords)
  # Create the secret once:
  #   kubectl create secret generic grafana-admin-secret \
  #     --from-literal=admin-user=admin \
  #     --from-literal=admin-password='<your-strong-password>' \
  #     -n monitoring
  admin:
    existingSecret: "grafana-admin-secret"
    userKey: admin-user
    passwordKey: admin-password
  service:
    type: NodePort
    nodePort: 30300
  # Auto-import dashboards from ConfigMaps labelled grafana_dashboard=1
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:30300"

# ── Prometheus ─────────────────────────────────────────────────────────────────
prometheus:
  enabled: true
  prometheusSpec:
    # Watch ServiceMonitors in ALL namespaces (including watermark-app)
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}
    # Watch PrometheusRules in ALL namespaces
    ruleSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleNamespaceSelector: {}
    retention: 15d
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
  service:
    type: NodePort
    nodePort: 30090

# ── Alertmanager ──────────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 50m
  service:
    type: NodePort
    nodePort: 30093

# ── Node Exporter ─────────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── Kube State Metrics ────────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true

# ── Default rules / dashboards ────────────────────────────────────────────────
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false        # not exposed in most managed k8s
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sContainerResource: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: false
    kubelet: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
