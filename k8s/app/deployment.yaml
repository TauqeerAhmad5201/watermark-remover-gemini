apiVersion: apps/v1
kind: Deployment
metadata:
  name: watermark-app
  namespace: watermark-app
  labels:
    app: watermark-app
spec:
  replicas: 5
  selector:
    matchLabels:
      app: watermark-app
  template:
    metadata:
      labels:
        app: watermark-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      containers:
        - name: watermark-app
          image: tauqeerops/gemini-watermark:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            failureThreshold: 10
            periodSeconds: 6      # up to 60 s for the app to start
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          resources:              
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"