apiVersion: v1
kind: Service
metadata:
  name: watermark-app
  namespace: watermark-app
  labels:
    app: watermark-app
spec:
  type: NodePort
  selector:
    app: watermark-app
  ports:
    - name: http
      port: 80 ## service port -> used in terminal commands and other services
      targetPort: 3000 ## containerPort in Deployment
      nodePort: 30080 ## optional, if not specified Kubernetes will assign a random port in the range 30000-32767
